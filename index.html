  <script>
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let ctx = null;

    function getCtx() {
      if (!ctx) ctx = new AudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    function playTone({ freq = 440, type = 'sine', duration = 0.12, volume = 0.4, delay = 0, attack = 0.01 }) {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.connect(gain);
      gain.connect(c.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, c.currentTime + delay);
      gain.gain.setValueAtTime(0, c.currentTime + delay);
      gain.gain.linearRampToValueAtTime(volume, c.currentTime + delay + attack);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      osc.start(c.currentTime + delay);
      osc.stop(c.currentTime + delay + duration + 0.05);
    }

    function playNoise({ duration = 0.08, volume = 0.15, delay = 0 }) {
      const c = getCtx();
      const bufSize = c.sampleRate * duration;
      const buf = c.createBuffer(1, bufSize, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const src = c.createBufferSource();
      src.buffer = buf;
      const gain = c.createGain();
      gain.gain.setValueAtTime(volume, c.currentTime + delay);
      gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + delay + duration);
      const filter = c.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1200;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(c.destination);
      src.start(c.currentTime + delay);
      src.stop(c.currentTime + delay + duration + 0.05);
    }

    const sounds = {

    };

    window.addEventListener('load', () => {
      setTimeout(() => sounds.pageLoad(), 400);
    });

    document.querySelectorAll('.card').forEach(card => {
      const soundName = card.dataset.sound;
      card.addEventListener('mouseenter', () => sounds.hover());
      card.addEventListener('mousedown', () => {

      });
      card.addEventListener('touchstart', () => {

  <!-- Particle Canvas -->
  <canvas id="particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
  <script>
    const canvas = document.getElementById('particles');
    const ctx2 = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function randomStar() {
      return {
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.2 + 0.2,
        alpha: Math.random() * 0.5 + 0.1,
        speed: Math.random() * 0.25 + 0.05,
        drift: (Math.random() - 0.5) * 0.15,
        twinkleSpeed: Math.random() * 0.008 + 0.003,
        twinkleOffset: Math.random() * Math.PI * 2,
      };
    }

    function initStars() {
      const count = Math.floor((W * H) / 6000);
      stars = Array.from({ length: Math.min(count, 120) }, randomStar);
    }

    function draw(t) {
      ctx2.clearRect(0, 0, W, H);
      for (const s of stars) {
        const twinkle = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
        ctx2.beginPath();
        ctx2.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx2.fillStyle = `rgba(180,210,255,${twinkle})`;
        ctx2.fill();

        s.y -= s.speed;
        s.x += s.drift;

        if (s.y < -4) { s.y = H + 4; s.x = Math.random() * W; }
        if (s.x < -4) s.x = W + 4;
        if (s.x > W + 4) s.x = -4;
      }
      requestAnimationFrame(draw);
    }

    resize();
    initStars();
    window.addEventListener('resize', () => { resize(); initStars(); });
    requestAnimationFrame(draw);
  </script>

  <script>
    const phrases = [
      'Content Creator',
      'Gamer',
      'Video Editor',
      

    ];
    const el = document.getElementById('typing-text');
    let pi = 0, ci = 0, deleting = false, pauseTimer = null;

    function type() {
      const phrase = phrases[pi];
      if (!deleting) {
        el.textContent = phrase.slice(0, ++ci);
        if (ci === phrase.length) {
          deleting = true;
          pauseTimer = setTimeout(type, 1800);
          return;
        }
        setTimeout(type, 65 + Math.random() * 40);
      } else {
        el.textContent = phrase.slice(0, --ci);
        if (ci === 0) {
          deleting = false;
          pi = (pi + 1) % phrases.length;
          setTimeout(type, 400);
          return;
        }
        setTimeout(type, 35);
      }
    }

    setTimeout(type, 900);
  </script>


<script>
  const DISCORD_ID = "579606759216250880";

  async function loadDiscordProfile() {
    try {
      const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const data = await res.json();

      if (!data.success) return;

      const user = data.data.discord_user;

      // USERNAME
      document.querySelector(".profile-name").textContent =
        user.global_name || user.username;

      // AVATAR
      const avatarUrl =
        `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=512`;

      document.querySelector(".avatar-img").src = avatarUrl;

      // AVATAR DECORATION
      if (user.avatar_decoration_data) {
        const deco = document.createElement("img");

        deco.src =
          `https://cdn.discordapp.com/avatar-decoration-presets/${user.avatar_decoration_data.asset}.png`;

        deco.className = "avatar-decoration";

        document.getElementById("avatar-wrap").appendChild(deco);
      }

      // STATUS ONLINE DOT
      const status = data.data.discord_status;
      const dot = document.querySelector(".online-dot");

      const colors = {
        online: "#23a55a",
        idle: "#f0b232",
        dnd: "#f23f43",
        offline: "#80848e"
      };

      dot.style.background = colors[status] || "#23a55a";

    } catch (err) {
      console.log(err);
    }
  }

  loadDiscordProfile();
</script>
